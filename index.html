<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIGN IN</title>
    <style>
         body {
            position: absolute;
            top: 0%;
            left: 0%;
           width: 100%;
            /* min-height: 100vh; */
            font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* background: #be0802; */
            background-image:url(AdobeStock_403290733_Preview.jpeg);
            /* height: 300px; */
            background-repeat: no-repeat;
            background-size: cover;
            padding: 10px;
        }

        .container {
            width: 350px;
            background: white;
            padding: 20px;
            margin: 50px auto;
            border-radius: 10px;
            box-shadow: 0px 0px 10px #999;
        }

        input, select {
            width: 100%;
            padding: 7px;   
            margin-top: 5px;
            margin-bottom: 15px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #012a57;
            color: aquamarine;
        }
        form{
            color: #c71602f2;
            font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
            /* background-color: aquamarine; */

        }
        h2{
            font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
            /* font-style: italic; */
        }
        .reg{
            background-color: #ad0b03f3;
        }
        body:background-image{
            filter: blur(5px);
        }
    </style>
</head>
<body>
    
    <div class="container">
    <h2>CINEFLIX</h2>

    <form>
        <label>Full Name</label>
        <input type="text" required>

        <label>Email</label>
        <input type="email" required>

        <label>Password</label>
        <input type="password" required>

        <label>Phone Number</label>
        <input type="number">

        <label>Gender</label>
        <select>
            <option>Male</option>
            <option>Female</option>
            <option>Other</option>
        </select>

        <label>Date of Birth</label>
        <input type="date">

        <a href="main.html" target="_blank"><button class="reg" type="submit">REGISTER</button></a>
    </form>
</div>
</body>
</html>
